plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

remote_theme: ucsb-cs-course-repos/course-repo-jekyll-theme

url: https://ucsb-cs9.github.io
baseurl: "/s26"

course: "CS 9"
qtr: "S26"
instructor: "Prof Kate"
quarter: "Spring 2026"
slides_url: 
# ### TODO: check navigation.yml for top-bar links
piazza_url: 
gradescope_url: https://www.gradescope.com/courses/1289625/assignments


github_url: https://github.com/ucsb-cs9/s26

start_week: 1
start_date: 2026-03-29 00:00:00.00-7:00
num_weeks: 10
extra_exam_week: true

# ### https://registrar.sa.ucsb.edu/calendars/calendars-deadlines/academic-calendars
# ### https://registrar.sa.ucsb.edu/calendars/quarterly-deadlines

# TODO: make sure that the exam dates are correct on the syllabus as well!
#  https://registrar.sa.ucsb.edu/calendars/final-exams

cal_dates: >                                                                    
  [                                                                            
    {"label":"S26 1st day of instruction", "date":"2026-03-30" },
    {"label":"S26 deadline to drop courses w/o W", "date":"2026-04-24" },
    {"label":"S26 CS 9 MIDTERM (3:30pm - 4:45pm)", "date":"2026-04-30" }, 
    {"label":"Holiday: Memorial Day", "date":"2026-05-25" },
    {"label":"S26 instruction ends", "date":"2026-06-05" },
    {"label":"S26 CS 9 FINAL (7:30pm - 9:00pm)", "date":"2026-06-09" }, 
    {"label":"S26 qtr ends", "date":"2026-06-12" }
  ]
#    {"label":"S26 grades due", "date":"2026-06-17" }

kramdown:
   parse_block_html: true
   default_lang: cpp

exclude:
   - vendor
   - _hwk/keep
   - _lab/keep
   - _exam/keep
   - _lectures/keep
   - _info/keep        
include:
   - _pages
   
timezone: America/Los_Angeles

collections:
  hwk:
    output: true
    permalink: /hwk/:path/
    last_before: false
  lab:
    output: true
    permalink: /lab/:path/
    last_before: false
  labWIP:
    output: true
    permalink: /labWIP/:path/
    last_before: false
  exam:
    output: true
    permalink: /exam/:path/
  info:
    output: true
    permalink: /info/:path/
  lectures:
    output: true
    permalink: /lectures/:path/


defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
    values:
      layout: default
  - 
    scope:
      path: ""
      type: lectures
    values:
      layout: lecture
  - 
    scope:
      path: ""
      type: hwk
    values:
      layout: lab
  - 
    scope:
      path: ""
      type: lab
    values:
      layout: lab
  - 
    scope:
      path: ""
      type: labWIP
    values:
      layout: lab
  - 
    scope:
      path: ""
      type: exam
    values:
      layout: exam_info
  - 
    scope:
      path: ""
      type: info
    values:
      layout: default
  -
    scope:
      path: "syllabus.md"
      type: info
    values:
      layout: handout
